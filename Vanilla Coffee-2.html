const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "padding": 30

(function setupTweaks() {
  let state = {
    ...TWEAK_DEFAULTS

    if (!panelVisible) {
      if (panel) panel.remove();
      return;

    if (!panel) {

      panel.id = '__tweaks-panel';
      Object.assign(panel.style, {
        position: 'fixed',
        bottom: '20px',

        zIndex: '99999',
        background: '#1A120B',
        color: '#FAF4E8',
        padding: '16px 18px',
        borderRadius: '14px',
        fontFamily: 'Inter, system-ui, sans-serif',
        fontSize: '13px',
        width: '240px',
        boxShadow: '0 20px 50px -10px rgba(0,0,0,0.5)',
        border: '1px solid rgba(255,255,255,0.08)'
      });
      document.body.appendChild(panel);
    }
    panel.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div style="font-weight:700;letter-spacing:-0.01em;">Tweaks</div>
        <div style="font-size:11px;opacity:0.5;">Vanilla Coffee</div>
      </div>
      <label style="display:block;margin-bottom:6px;">
        <div style="display:flex;justify-content:space-between;font-size:11px;opacity:0.7;margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase;">
          <span>Phone padding</span>
          <span id="__tw-padding-val">${state.padding}px</span>
        </div>
        <input id="__tw-padding" type="range" min="0" max="120" step="2" value="${state.padding}" style="width:100%;accent-color:#FF6600;">
      </label>
    `;
    const slider = panel.querySelector('#__tw-padding');
    const valEl = panel.querySelector('#__tw-padding-val');
    slider.addEventListener('input', e => {
      state.padding = +e.target.value;
      valEl.textContent = state.padding + 'px';
      apply();
    });
    slider.addEventListener('change', e => {
      state.padding = +e.target.value;
      try {
        window.parent.postMessage({
          type: '__edit_mode_set_keys',
          edits: {
            padding: state.padding
          }
        }, '*');
      } catch (err) {}
    });
  }
  window.addEventListener('message', ev => {
    const d = ev.data || {};
    if (d.type === '__activate_edit_mode') {
      panelVisible = true;
      renderPanel();
    } else if (d.type === '__deactivate_edit_mode') {
      panelVisible = false;
      renderPanel();
    }
  });
  try {
    window.parent.postMessage({
      type: '__edit_mode_available'
    }, '*');
  } catch (e) {}
})();

// ═══ QR MODAL ═════════════════════════════════════════════════════
function QRCode({ size = 240 }) {
  const pattern = useMemo(() => {
    const n = 25;
    const arr = [];
    for (let y = 0; y < n; y++) {
      for (let x = 0; x < n; x++) {
        const inFinder = (fx, fy) => x >= fx && x < fx + 7 && y >= fy && y < fy + 7;
        const isFinder = inFinder(0,0) || inFinder(n-7,0) || inFinder(0,n-7);
        if (isFinder) {
          const inner = (fx, fy) => {
            const lx = x - fx, ly = y - fy;
            const border = lx === 0 || lx === 6 || ly === 0 || ly === 6;
            const core = lx >= 2 && lx <= 4 && ly >= 2 && ly <= 4;
            return border || core;
          };
          if (inner(0,0) || inner(n-7,0) || inner(0,n-7)) arr.push([x, y]);
        } else {
          const v = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
          if ((v - Math.floor(v)) > 0.55) arr.push([x, y]);
        }
      }
    }
    return arr;
  }, []);
  const cell = size / 27;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <rect width={size} height={size} fill="#fff" />
      {pattern.map(([x, y], i) => (
        <rect key={i} x={(x + 1) * cell} y={(y + 1) * cell} width={cell * 0.95} height={cell * 0.95} fill={V.ink} rx={cell * 0.2} />
      ))}
      <rect x={size / 2 - 22} y={size / 2 - 22} width={44} height={44} rx={10} fill="#fff"/>
      <rect x={size / 2 - 19} y={size / 2 - 19} width={38} height={38} rx={9} fill={V.coffee}/>
      <g transform={`translate(${size/2 - 11}, ${size/2 - 13})`}>
        <rect x="5" y="0" width="6" height="6" transform="rotate(45 8 3)" fill={V.vanilla}/>
        <path d="M-2 9 L8 17 L18 9 L18 13 L8 21 L-2 13 Z" fill={V.vanilla} transform="translate(3, 0)"/>
      </g>
    </svg>
  );
}

// ═══ TWEAKS ═══════════════════════════════════════════════════════
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "padding": 30
}/*EDITMODE-END*/;

(function setupTweaks() {
  let state = { ...TWEAK_DEFAULTS };
  let panelVisible = false;

  function apply() {
    document.body.style.padding = state.padding + 'px';
  }
  apply();

  function renderPanel() {
    let panel = document.getElementById('__tweaks-panel');
    if (!panelVisible) { if (panel) panel.remove(); return; }
    if (!panel) {
      panel = document.createElement('div');
      panel.id = '__tweaks-panel';
      Object.assign(panel.style, {
        position: 'fixed', bottom: '20px', right: '20px', zIndex: '99999',
        background: '#1A120B', color: '#FAF4E8', padding: '16px 18px',
        borderRadius: '14px', fontFamily: 'Inter, system-ui, sans-serif',
        fontSize: '13px', width: '240px',
        boxShadow: '0 20px 50px -10px rgba(0,0,0,0.5)',
        border: '1px solid rgba(255,255,255,0.08)',
      });
      document.body.appendChild(panel);
    }
    panel.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div style="font-weight:700;letter-spacing:-0.01em;">Tweaks</div>
        <div style="font-size:11px;opacity:0.5;">Vanilla Coffee</div>
      </div>
      <label style="display:block;margin-bottom:6px;">
        <div style="display:flex;justify-content:space-between;font-size:11px;opacity:0.7;margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase;">
          <span>Phone padding</span>
          <span id="__tw-padding-val">${state.padding}px</span>
        </div>
        <input id="__tw-padding" type="range" min="0" max="120" step="2" value="${state.padding}" style="width:100%;accent-color:#FF6600;">
      </label>
    `;
    const slider = panel.querySelector('#__tw-padding');
    const valEl = panel.querySelector('#__tw-padding-val');
    slider.addEventListener('input', e => {
      state.padding = +e.target.value;
      valEl.textContent = state.padding + 'px';
      apply();
    });
    slider.addEventListener('change', e => {
      state.padding = +e.target.value;
      try {
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { padding: state.padding } }, '*');
      } catch (err) {}
    });
  }

  window.addEventListener('message', (ev) => {
    const d = ev.data || {};
    if (d.type === '__activate_edit_mode') { panelVisible = true; renderPanel(); }
    else if (d.type === '__deactivate_edit_mode') { panelVisible = false; renderPanel(); }
  });

  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
})();
</script>
